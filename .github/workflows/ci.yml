name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - run: uv sync --locked

      - run: uv run ruff check .

      - run: uv run pyright runware

      - run: uv run pytest tests/ --ignore=tests/integration
